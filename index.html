<!DOCTYPE html>
<html>
<head>
  <title>Shared Document Access</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      width: 360px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      text-align: left;
    }
  </style>
</head>
<body>

<div class="box" id="box">
  <h2>Shared Document</h2>
  <p>Please sign in to continue.</p>

  <input type="text" placeholder="Enter your name or fake username">

  <button onclick="showLesson()">Continue</button>
</div>

<script>
function showLesson() {
  document.getElementById("box").innerHTML = `
    <h2>⚠️ Phishing Simulation</h2>
    <p>You almost trusted a fake login page.</p>
    <p>This was a safe cyber security activity.</p>

    <ul>
      <li>Always check the URL</li>
      <li>Do not trust unexpected shared documents</li>
      <li>Never enter passwords after clicking unknown links</li>
      <li>Check the sender carefully</li>
      <li>Ask a teacher or IT staff if unsure</li>
    </ul>
  `;
}
</script>

</body>
</html>
